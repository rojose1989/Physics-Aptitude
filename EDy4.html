<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px;background:#f4f7fb}
h1{text-align:center;color:#003366}
#timer{float:right;font-size:24px;font-weight:bold;color:#c00}
#progressBar{width:100%;height:18px;background:#ddd;border-radius:10px;overflow:hidden;margin:10px 0}
#progressFill{height:100%;width:0;background:#4caf50}
#banner{display:none;background:#fff3cd;padding:10px;border-radius:6px;margin:10px 0;font-weight:bold}
#palette{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.pal{width:32px;height:32px;border:none;border-radius:4px;color:#fff}
.unvisited{background:#9e9e9e}.answered{background:#4caf50}.skipped{background:#ff9800}
.option{display:block;border:1px solid #ccc;padding:8px;margin:6px 0;border-radius:5px}
.feedback{display:none;padding:10px;margin-top:10px}
.correct{background:#d4edda}.incorrect{background:#f8d7da}
button{padding:10px 18px;margin:5px}
#result{display:none}
</style>
</head>
<body>
<h1 id="quizTitle">7.3 Maxwells Equation</h1>
<div id="timer">05:00</div><div style="clear:both"></div>
<div id="progressBar"><div id="progressFill"></div></div>
<div id="banner">Reviewing Skipped Questions</div>
<div id="palette"></div>

<div><b>Score:</b> <span id="score">0.00</span></div>
<div id="progressText"></div>
<div id="quiz"></div>
<div id="feedback" class="feedback"></div>

<button id="nextBtn" style="display:none">Next Question</button>
<button id="skipBtn">Skip Question</button>
<button id="submitBtn" style="display:none">Submit Quiz</button>

<div id="result">
<h2>Quiz Completed</h2>
<div id="finalScore"></div>
<div id="comment"></div>
<button id="downloadTxt">Download Result (TXT)</button>
<button onclick="location.reload()">Attempt Again</button>
</div>

<script>
const NEGATIVE=0.33;
let timeLeft=300;

/* EDIT ONLY THIS BLOCK */
const questions=[

{
q:"Which of the following is NOT one of Maxwell's equations in differential form?",

options:[
"∇·E = ρ/ε₀",
"∇·B = 0",
"∇×E = ρ/ε₀",
"∇×B = μ₀J + μ₀ε₀(∂E/∂t)"
],

answer:2,

exp:"Maxwell's equations consist of four fundamental equations: Gauss's law for electricity, Gauss's law for magnetism, Faraday's law of induction, and the Ampère-Maxwell law. The equation ∇×E = ρ/ε₀ is incorrect because the curl of the electric field is related to the time variation of the magnetic field, not to charge density. The correct equation is ∇×E = -∂B/∂t."
},

{
q:"Gauss's law for magnetism states that:",

options:[
"Magnetic monopoles exist.",
"The net magnetic flux through any closed surface is zero.",
"The electric flux through a closed surface is zero.",
"Magnetic field lines begin and end on magnetic charges."
],

answer:1,

exp:"Gauss's law for magnetism states that the total magnetic flux through any closed surface is always zero. This implies that magnetic field lines always form closed loops and that isolated magnetic monopoles have never been observed. Magnets always possess both north and south poles."
},

{
q:"The displacement current term was introduced by Maxwell to modify:",

options:[
"Gauss's law",
"Faraday's law",
"Ampère's law",
"Coulomb's law"
],

answer:2,

exp:"Maxwell realized that Ampère's law was incomplete for situations involving changing electric fields, such as charging a capacitor. He introduced the displacement current term μ₀ε₀(∂E/∂t), making the law consistent with charge conservation and allowing electromagnetic waves to be predicted."
},

{
q:"The displacement current arises due to:",

options:[
"Moving free charges only",
"Changing magnetic field",
"Changing electric field",
"Constant electric field"
],

answer:2,

exp:"Displacement current is not caused by the actual motion of electric charges. Instead, it arises whenever the electric field changes with time. Maxwell showed that this changing electric field produces magnetic effects equivalent to those of an ordinary conduction current."
},

{
q:"Why was Maxwell's displacement current necessary in the region between the plates of a charging capacitor?",

options:[
"Because electrons move directly across the dielectric.",
"Because magnetic fields cannot exist inside a capacitor.",
"Because there is no conduction current between the plates, but the changing electric field still produces a magnetic field.",
"Because the electric field is always zero inside the capacitor."
],

answer:2,

exp:"During the charging of a capacitor, no conduction current flows through the insulating gap between the plates. However, the electric field between the plates changes with time. Maxwell introduced the concept of displacement current so that Ampère's law would correctly predict the magnetic field in this region and satisfy the continuity equation."
},

{
q:"According to Maxwell's equations, a time-varying magnetic field produces:",

options:[
"A constant electric potential only",
"A changing electric field",
"An induced electric field",
"A magnetic monopole"
],

answer:2,

exp:"Faraday's law states that a changing magnetic field induces an electric field. Unlike electrostatic fields, this induced electric field forms closed loops and is non-conservative. This principle forms the basis of electric generators and transformers."
},

{
q:"A parallel-plate capacitor is being charged by a battery. Which statement is correct?",

options:[
"The conduction current and displacement current are both zero.",
"The displacement current equals the conduction current in magnitude.",
"The displacement current is always greater than the conduction current.",
"The conduction current exists only between the capacitor plates."
],

answer:1,

exp:"During charging, conduction current flows through the connecting wires, while displacement current exists in the dielectric between the plates due to the changing electric field. Maxwell showed that these two currents have equal magnitude, ensuring current continuity throughout the circuit."
},

{
q:"Which statement best describes the significance of Maxwell's equations?",

options:[
"They explain only electrostatics.",
"They unify electricity, magnetism and electromagnetic induction into a single theory.",
"They apply only to conductors.",
"They replace Newton's laws of motion."
],

answer:1,

exp:"Maxwell's equations unified all known laws of electricity and magnetism into one elegant theoretical framework. They showed that electric and magnetic fields are closely related and predicted the existence of electromagnetic waves, leading to the understanding that light itself is an electromagnetic wave."
}

];
let currentQuestion=0,score=0,correct=0,wrong=0,skipped=0,answered=false,reviewMode=false;
let userAnswers=new Array(questions.length).fill(null);
let skippedQueue=[];
let answeredSet=new Set();

const quiz=document.getElementById("quiz");
const feedback=document.getElementById("feedback");

function drawPalette(){
 let h="";
 for(let i=0;i<questions.length;i++){
   let cls="unvisited";
   if(answeredSet.has(i)) cls="answered";
   if(skippedQueue.includes(i)) cls="skipped";
   h+=`<button class="pal ${cls}" disabled>${i+1}</button>`;
 }
 document.getElementById("palette").innerHTML=h;
}

function updateProgress(){
 let done=correct+wrong;
 document.getElementById("progressFill").style.width=((done/questions.length)*100)+"%";
}

function loadQuestion(){
 answered=false;
 feedback.style.display="none";
 document.getElementById("nextBtn").style.display="none";
 document.getElementById("skipBtn").style.display="inline-block";
 document.getElementById("submitBtn").style.display=reviewMode?"inline-block":"none";
 document.getElementById("banner").style.display=reviewMode?"block":"none";
 document.getElementById("progressText").textContent=reviewMode?"Reviewing Skipped Questions":`Question ${currentQuestion+1} of ${questions.length}`;

 let q=questions[currentQuestion];
 let html=`<h3>${q.q}</h3>`;
 q.options.forEach((o,i)=>{
   html+=`<label class="option"><input type="radio" name="ans" value="${i}"> ${o}</label>`;
 });
 html+=`<button onclick="checkAnswer()">Check Answer</button>`;
 quiz.innerHTML=html;
 drawPalette();
 updateProgress();
}

function checkAnswer(){
 if(answered)return;
 let s=document.querySelector('input[name="ans"]:checked');
 if(!s){alert("Select an answer");return;}
 answered=true;
 document.getElementById("skipBtn").style.display="none";
 let q=questions[currentQuestion];
 let choice=parseInt(s.value);
 userAnswers[currentQuestion]=choice;
 answeredSet.add(currentQuestion);

 if(choice===q.answer){
   score+=1; correct++;
   feedback.className="feedback correct";
   feedback.innerHTML=`✅ Correct<br><br>${q.exp}`;
 }else{
   score-=NEGATIVE; wrong++;
   feedback.className="feedback incorrect";
   feedback.innerHTML=`❌ Incorrect<br><br><b>Correct Answer:</b> ${q.options[q.answer]}<br><br>${q.exp}`;
 }
 feedback.style.display="block";
 document.getElementById("score").textContent=score.toFixed(2);
 document.getElementById("nextBtn").style.display="inline-block";
 drawPalette(); updateProgress();
}

function enterReview(){
 reviewMode=true;
 if(skippedQueue.length===0){showResult();return;}
 currentQuestion=skippedQueue.shift();
 loadQuestion();
}

document.getElementById("nextBtn").addEventListener("click",()=>{
 if(reviewMode){
   if(skippedQueue.length===0) showResult();
   else {currentQuestion=skippedQueue.shift(); loadQuestion();}
   return;
 }
 currentQuestion++;
 if(currentQuestion<questions.length) loadQuestion();
 else enterReview();
});

document.getElementById("skipBtn").addEventListener("click",()=>{
 if(reviewMode){
   if(skippedQueue.length===0) showResult();
   else {currentQuestion=skippedQueue.shift(); loadQuestion();}
   return;
 }
 userAnswers[currentQuestion]=null;
 skippedQueue.push(currentQuestion);
 skipped++;
 currentQuestion++;
 if(currentQuestion<questions.length) loadQuestion();
 else enterReview();
});

document.getElementById("submitBtn").addEventListener("click",()=>showResult());

function showResult(){
 clearInterval(timer);
 quiz.style.display="none";
 feedback.style.display="none";
 document.getElementById("nextBtn").style.display="none";
 document.getElementById("skipBtn").style.display="none";
 document.getElementById("submitBtn").style.display="none";

 let percent=Math.max(0,(score/questions.length)*100);
 let comment="💪 Keep practicing.";
 if(percent>=90) comment="🌟 Excellent!";
 else if(percent>=75) comment="👏 Very Good!";
 else if(percent>=60) comment="👍 Good effort.";
 else if(percent>=40) comment="📘 Fair attempt.";

 document.getElementById("finalScore").innerHTML=`Correct: ${correct}<br>Wrong: ${wrong}<br>Skipped: ${skipped}<br>Score: ${score.toFixed(2)} / ${questions.length}<br>Percentage: ${percent.toFixed(1)}%`;
 document.getElementById("comment").innerHTML=comment;
 document.getElementById("result").style.display="block";
}

document.getElementById("downloadTxt").addEventListener("click",()=>{
const title=document.getElementById("quizTitle").innerText;
let txt="=========================================\n";
txt+=title+"\n=========================================\n\n";
txt+="Date : "+new Date().toLocaleString()+"\n\n";
txt+="Score : "+score.toFixed(2)+" / "+questions.length+"\n";
txt+="Correct : "+correct+"\nWrong : "+wrong+"\nSkipped : "+skipped+"\n";
txt+="Percentage : "+((score/questions.length)*100).toFixed(1)+"%\n\n";
for(let i=0;i<questions.length;i++){
txt+="----------------------------------------\nQuestion "+(i+1)+"\n\n";
txt+=questions[i].q+"\n\n";
questions[i].options.forEach((o,j)=>{txt+=(j+1)+". "+o+"\n";});
txt+="\nYour Answer : "+(userAnswers[i]==null?"Skipped":questions[i].options[userAnswers[i]])+"\n";
txt+="Correct Answer : "+questions[i].options[questions[i].answer]+"\n";
txt+="Result : "+(userAnswers[i]==null?"Skipped":(userAnswers[i]==questions[i].answer?"Correct":"Incorrect"))+"\n\n";
txt+="Explanation:\n"+questions[i].exp+"\n\n";}
const blob=new Blob([txt],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Quiz_Report.txt";
a.click();
});
const timer=setInterval(()=>{
 let m=Math.floor(timeLeft/60),s=timeLeft%60;
 document.getElementById("timer").textContent=String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
 timeLeft--;
 if(timeLeft<0) showResult();
},1000);

loadQuestion();
</script>
</body>
</html>
